{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <section>
      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ $pageLink := .RelPermalink }}
      {{ with (.Resources.ByType "image" | first 1) }}
        {{ range . }}
          <a href="{{ $pageLink }}"><img src="{{ .RelPermalink }}" alt=""></a>
        {{ end }}
      {{ end }}
    </section>
  {{ end }}
{{ end }}
